name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Pack (dir)
        run: npm run pack
      - name: Upload linux pack
        uses: actions/upload-artifact@v4
        with:
          name: instant-drama-magician-linux-unpacked
          path: release/linux-unpacked
          if-no-files-found: warn
          retention-days: 14
