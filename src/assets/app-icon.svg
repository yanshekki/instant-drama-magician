<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ysk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- rounded app plate -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#plate)"/>
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#ysk-grad)" stroke-width="6" opacity="0.55"/>
  <!-- YSK hexagon mark (scaled from 100x100 logo into ~320 box centered) -->
  <g transform="translate(96 96) scale(3.2)" filter="url(#glow)">
    <path d="M50 5 L95 27.5 L95 72.5 L50 95 L5 72.5 L5 27.5 Z"
          fill="none" stroke="url(#ysk-grad)" stroke-width="4"/>
    <g stroke="#c9d1d9" stroke-width="4" stroke-linecap="round">
      <line x1="50" y1="50" x2="50" y2="80"/>
      <line x1="50" y1="50" x2="25" y2="35"/>
      <line x1="50" y1="50" x2="75" y2="35"/>
    </g>
    <circle cx="25" cy="35" r="4.5" fill="#58a6ff"/>
    <circle cx="75" cy="35" r="4.5" fill="#58a6ff"/>
    <circle cx="50" cy="80" r="4.5" fill="#2ea043"/>
    <circle cx="50" cy="50" r="3.5" fill="#ffffff"/>
  </g>
</svg>
